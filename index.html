<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Dynasty League Hub</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --tcl: #1a7a32;
    --tdl: #2b6cb0;
    --tsl: #c0155e;
    --txl: #8a8a8a;
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #888;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'Barlow', sans-serif;
    --font-cond: 'Barlow Condensed', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(10,10,10,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem; height: 64px;
  }
  .nav-logo { font-family: var(--font-display); font-size: 1.8rem; letter-spacing: 2px; color: var(--text); }
  .nav-logo span { color: #ccc; font-size: 0.9rem; font-family: var(--font-cond); display: block; letter-spacing: 4px; margin-top: -4px; }
  .nav-links { display: flex; gap: 0.25rem; }
  .nav-links button {
    background: none; border: none; color: var(--muted); font-family: var(--font-cond);
    font-size: 0.9rem; letter-spacing: 1.5px; text-transform: uppercase; padding: 0.4rem 0.9rem;
    cursor: pointer; border-radius: 4px; transition: all 0.2s;
  }
  .nav-links button:hover, .nav-links button.active { color: var(--text); background: var(--surface2); }
  .nav-user { display: flex; align-items: center; gap: 0.75rem; }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%; object-fit: cover;
    border: 2px solid var(--border);
  }
  .discord-btn {
    display: flex; align-items: center; gap: 0.5rem;
    background: #5865F2; color: white; border: none;
    font-family: var(--font-body); font-weight: 600; font-size: 0.85rem;
    padding: 0.5rem 1.1rem; border-radius: 6px; cursor: pointer; transition: opacity 0.2s;
  }
  .discord-btn:hover { opacity: 0.85; }
  .discord-btn svg { width: 18px; height: 18px; }

  /* MAIN CONTENT */
  main { padding-top: 64px; }

  /* HERO */
  .hero {
    position: relative; overflow: hidden;
    min-height: 520px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    padding: 4rem 2rem;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(26,122,50,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(43,108,176,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(192,21,94,0.08) 0%, transparent 50%);
  }
  .hero-grid {
    position: absolute; inset: 0; opacity: 0.03;
    background-image: linear-gradient(var(--border) 1px, transparent 1px),
                      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .hero h1 { font-family: var(--font-display); font-size: clamp(3rem, 8vw, 6rem); letter-spacing: 4px; position: relative; line-height: 1; }
  .hero p { color: var(--muted); font-size: 1.1rem; letter-spacing: 2px; font-family: var(--font-cond); text-transform: uppercase; margin: 1rem 0 2.5rem; position: relative; }

  /* LEAGUE CARDS */
  .leagues-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1rem; padding: 0 2rem 3rem; max-width: 1100px; margin: 0 auto;
  }
  .league-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.5rem; text-align: center;
    cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden;
  }
  .league-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--league-color);
  }
  .league-card:hover { border-color: var(--league-color); transform: translateY(-3px); background: var(--surface2); }
  .league-card img { width: 80px; height: 80px; object-fit: contain; margin-bottom: 0.75rem; }
  .league-card .no-logo {
    width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--league-color);
    display: flex; align-items: center; justify-content: center; margin: 0 auto 0.75rem;
    font-family: var(--font-display); font-size: 1.6rem; color: var(--league-color);
  }
  .league-card h3 { font-family: var(--font-display); font-size: 1.5rem; letter-spacing: 2px; color: var(--league-color); }
  .league-card p { font-size: 0.8rem; color: var(--muted); font-family: var(--font-cond); letter-spacing: 1px; text-transform: uppercase; margin-top: 0.25rem; }

  /* SECTIONS */
  section { max-width: 1100px; margin: 0 auto; padding: 2rem 2rem 4rem; }
  .section-title {
    font-family: var(--font-display); font-size: 2.5rem; letter-spacing: 3px;
    margin-bottom: 0.25rem;
  }
  .section-sub { color: var(--muted); font-family: var(--font-cond); letter-spacing: 2px; text-transform: uppercase; font-size: 0.85rem; margin-bottom: 2rem; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 0 2rem; }

  /* CHAMPIONS */
  .champions-filter { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .filter-btn {
    background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    font-family: var(--font-cond); letter-spacing: 1px; text-transform: uppercase;
    font-size: 0.8rem; padding: 0.4rem 0.9rem; border-radius: 20px; cursor: pointer; transition: all 0.2s;
  }
  .filter-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .filter-btn.active { color: white; border-color: transparent; }
  .champions-table { width: 100%; border-collapse: collapse; }
  .champions-table th {
    font-family: var(--font-cond); font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); text-align: left; padding: 0.5rem 1rem; border-bottom: 1px solid var(--border);
  }
  .champions-table td { padding: 0.85rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
  .champions-table tr:hover td { background: var(--surface2); }
  .league-badge {
    display: inline-block; font-family: var(--font-display); font-size: 0.9rem;
    letter-spacing: 1px; padding: 0.2rem 0.6rem; border-radius: 4px;
    border: 1px solid currentColor;
  }
  .trophy { color: gold; margin-right: 0.4rem; }
  .champ-score { color: var(--muted); font-size: 0.85rem; font-family: var(--font-cond); }

  /* GALLERY */
  .gallery-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: gap; }
  .upload-btn {
    background: var(--surface2); border: 1px dashed rgba(255,255,255,0.2); color: var(--text);
    font-family: var(--font-cond); letter-spacing: 1px; text-transform: uppercase; font-size: 0.85rem;
    padding: 0.5rem 1.2rem; border-radius: 6px; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .upload-btn:hover { border-color: rgba(255,255,255,0.4); background: var(--surface); }
  .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.75rem; }
  .gallery-item {
    aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: var(--surface);
    border: 1px solid var(--border); cursor: pointer; position: relative;
  }
  .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
  .gallery-item:hover img { transform: scale(1.05); }
  .gallery-item .photo-info {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    padding: 1.5rem 0.75rem 0.5rem; font-size: 0.75rem; font-family: var(--font-cond);
  }
  .gallery-empty {
    grid-column: 1/-1; text-align: center; padding: 4rem 2rem;
    color: var(--muted); font-family: var(--font-cond); letter-spacing: 1px; text-transform: uppercase;
  }
  .upload-area {
    border: 2px dashed rgba(255,255,255,0.15); border-radius: 12px; padding: 3rem 2rem;
    text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 1rem;
  }
  .upload-area:hover, .upload-area.drag { border-color: rgba(255,255,255,0.4); background: var(--surface2); }
  .upload-area p { color: var(--muted); font-family: var(--font-cond); letter-spacing: 1px; margin-top: 0.75rem; font-size: 0.9rem; }
  #file-input { display: none; }

  /* PROSPECT FORM */
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
  .form-group label { font-family: var(--font-cond); font-size: 0.8rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  .form-group input, .form-group select, .form-group textarea {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: var(--font-body); font-size: 0.95rem;
    padding: 0.65rem 0.9rem; transition: border-color 0.2s; outline: none;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: rgba(255,255,255,0.3); }
  .form-group select option { background: #1a1a1a; }
  .checkbox-group { display: flex; flex-direction: column; gap: 0.6rem; }
  .checkbox-item { display: flex; align-items: center; gap: 0.6rem; cursor: pointer; }
  .checkbox-item input[type=checkbox] { accent-color: var(--tcl); width: 16px; height: 16px; cursor: pointer; }
  .checkbox-item span { font-size: 0.9rem; }
  .submit-btn {
    background: var(--text); color: var(--bg); border: none;
    font-family: var(--font-display); font-size: 1.1rem; letter-spacing: 2px;
    padding: 0.85rem 2.5rem; border-radius: 6px; cursor: pointer; transition: opacity 0.2s; margin-top: 0.5rem;
  }
  .submit-btn:hover { opacity: 0.85; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .form-success { text-align: center; padding: 3rem; }
  .form-success .check { font-size: 3rem; margin-bottom: 1rem; }
  .form-success h3 { font-family: var(--font-display); font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 0.5rem; }
  .form-success p { color: var(--muted); font-family: var(--font-cond); }

  /* AUTH GATE */
  .auth-gate {
    min-height: calc(100vh - 64px); display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 1rem; text-align: center; padding: 2rem;
  }
  .auth-gate h2 { font-family: var(--font-display); font-size: 2rem; letter-spacing: 3px; }
  .auth-gate p { color: var(--muted); font-family: var(--font-cond); letter-spacing: 1px; max-width: 400px; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 1rem;
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 2rem; max-width: 520px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative;
  }
  .modal-close {
    position: absolute; top: 1rem; right: 1rem; background: none; border: none;
    color: var(--muted); cursor: pointer; font-size: 1.4rem; line-height: 1;
  }
  .modal h3 { font-family: var(--font-display); font-size: 1.6rem; letter-spacing: 2px; margin-bottom: 0.25rem; }
  .modal .modal-sub { color: var(--muted); font-family: var(--font-cond); font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 1.5rem; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 300;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.85rem 1.25rem; font-family: var(--font-cond); letter-spacing: 0.5px;
    animation: slideIn 0.3s ease; max-width: 320px;
  }
  .toast.success { border-color: var(--tcl); }
  .toast.error { border-color: #e53e3e; }
  @keyframes slideIn { from { transform: translateX(110%); } to { transform: translateX(0); } }

  /* LIGHTBOX */
  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 250;
    display: flex; align-items: center; justify-content: center; padding: 2rem;
  }
  .lightbox img { max-width: 90vw; max-height: 85vh; object-fit: contain; border-radius: 8px; }
  .lightbox-close { position: absolute; top: 1.5rem; right: 1.5rem; background: none; border: none; color: white; font-size: 2rem; cursor: pointer; }

  /* ADD CHAMPION */
  .add-champ-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: var(--font-cond); letter-spacing: 1px; text-transform: uppercase; font-size: 0.8rem;
    padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer; transition: all 0.2s;
  }
  .add-champ-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }

  @media (max-width: 640px) {
    .form-row { grid-template-columns: 1fr; }
    .nav-links { display: none; }
    .hero h1 { font-size: 3rem; }
  }
</style>
</head>

<script>

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3cHJjc2hqdmpndmFhcHlmbWJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NDA0MjgsImV4cCI6MjA5MTQxNjQyOH0.giYegXooD5Jv57wdHHsy1jAJmDPY-NE9Fa87WeCmSXk';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    flowType: 'pkce',
    detectSessionInUrl: true,
    persistSession: true,
    storage: {

const LEAGUES = [

  { id: 'tsl', name: 'The Superflex League', short: 'TSL', color: '#c0155e', logo: 'TSL_Icon.png', mfl: '65694' },

// MFL year is current year Jan-Feb, next year Mar-Dec
function getMFLYear() {
  const now = new Date();
  return now.getMonth() < 2 ? now.getFullYear() : now.getFullYear();
}
function getMFLUrl(leagueId) {
  const now = new Date();
  const year = now.getMonth() >= 2 ? now.getFullYear() : now.getFullYear() - 1;
  return `https://www42.myfantasyleague.com/${year}/home/${leagueId}#0`;
}

let currentPage = 'home';
let user = null;

window._debug = () => {

  for(let i=0;i<sessionStorage.length;i++){const k=sessionStorage.key(i);if(k.includes("supabase")||k.includes("sb-"))console.log("SS:",k,"=",sessionStorage.getItem(k)?.substring(0,80));}

// ── AUTH ──────────────────────────────────────────────────────────────────────
// Discord user IDs allowed to edit champions (add/remove from this list)
const CHAMPION_ADMINS = ['227860796003057677'];

// Cache provider_token from OAuth redirect — it's only present on the first callback
let cachedProviderToken = null;

async function initAuth() {
  const hasCode = window.location.search.includes('code=');
  console.log("initAuth | hasCode:", hasCode, "| url:", window.location.href.substring(0,80));

  // If there is a PKCE code in the URL, Supabase needs time to exchange it.
  // onAuthStateChange will fire with SIGNED_IN once exchange is complete.
  // We render a loading state immediately, then update when auth resolves.

  // Always set up the listener first
  sb.auth.onAuthStateChange((_event, session) => {
    console.log("Auth event:", _event, "| user:", session?.user?.email || "null");
    if (_event === "SIGNED_OUT") {
      user = null;
      cachedProviderToken = null;
      renderNav();
      renderPage(currentPage);
    } else if (session?.user) {
      if (session.provider_token) cachedProviderToken = session.provider_token;
      user = session.user;
      console.log("isAdmin:", isChampionAdmin());
      // Clean up code from URL
      if (window.location.search.includes('code=')) {
        window.history.replaceState({}, '', window.location.pathname);
      }
      renderNav();
      renderPage(currentPage);
    }
  });

  if (!hasCode) {
    // No OAuth redirect — check for existing persisted session
    const { data: { session } } = await sb.auth.getSession();
    console.log("getSession result:", session?.user?.email || "none");
    if (session?.user) {
      if (session.provider_token) cachedProviderToken = session.provider_token;
      user = session.user;
    }
    renderNav();
    renderPage(currentPage);
  } else {
    // Has code — show loading while Supabase exchanges it
    // onAuthStateChange above will re-render when done
    document.getElementById('main-content').innerHTML = `
      <div style="min-height:80vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;">
        <div style="font-family:var(--font-display);font-size:1.5rem;letter-spacing:3px;color:var(--muted);">SIGNING IN...</div>
      </div>`;
    renderNav();
  }
}

function isChampionAdmin() {
  if (!user) return false;
  if (CHAMPION_ADMINS.length === 0) return true;
  const possible = [
    user.user_metadata?.provider_id,
    user.user_metadata?.sub,
    user.identities?.[0]?.id,
    user.identities?.[0]?.identity_data?.provider_id,
    user.identities?.[0]?.identity_data?.sub,
    user.id
  ].filter(Boolean);
  console.log('Admin check — IDs found:', possible);
  return possible.some(id => CHAMPION_ADMINS.includes(String(id)));
}

async function checkGuildMembership(providerToken) {
  // Direct Discord API call — works when not blocked by ad blockers
  // Falls back to allowing access if the call fails (fail-open)
  try {
    if (!providerToken) return true; // fail-open: no token = trust Supabase session
    const res = await fetch('https://discord.com/api/v10/users/@me/guilds', {
      headers: { 'Authorization': 'Bearer ' + providerToken }
    });
    if (!res.ok) {
      console.warn('Discord guild check returned', res.status, '— allowing access');
      return true;
    }
    const guilds = await res.json();
    const member = Array.isArray(guilds) && guilds.some(g => g.id === REQUIRED_GUILD_ID);
    console.log('Guild check result:', member, '| guilds found:', guilds.length);
    return member;
  } catch (e) {
    console.warn('Guild check failed, allowing access:', e.message);
    return true; // fail-open
  }
}

      </p>

// ── ROUTER ────────────────────────────────────────────────────────────────────
function navigateTo(page) {
  currentPage = page;
  renderNav();
  renderPage(page);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderPage(page) {
  const mc = document.getElementById('main-content');
  if (page === 'home') renderHome(mc);
  else if (page === 'champions') renderChampions(mc);
  else if (page === 'gallery') renderGallery(mc);
  else if (page === 'join') renderJoin(mc);
  else if (page.startsWith('docs-')) renderLeagueDocs(mc, page.replace('docs-', ''));
}

// ── CHAMPIONS ─────────────────────────────────────────────────────────────────
let champFilter = 'all';
let champions = [];

const CHAMP_YEARS = [2026,2025,2024,2023,2022,2021];
const AWARD_TYPES = [
  { id: 'superbowl', label: 'Super Bowl Champion', icon: null, img: 'superbowl.png' },
  { id: 'afc', label: 'AFC Champion', icon: null, img: 'afc-logo.png' },
  { id: 'nfc', label: 'NFC Champion', icon: null, img: 'NFC-Logo.png' },
];
let champYearFilter = 'all';

async function renderChampions(el) {
  el.innerHTML = `
    <section>
      <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:0.25rem;">
        <div>
          <div class="section-title">🏆 Hall of Champions</div>
          <div class="section-sub">Every title, every season, every legend</div>
        </div>
        ${isChampionAdmin() ? `<button class="add-champ-btn" onclick="openAddChampion()">+ Add Entry</button>` : ''}
      </div>
      <div class="champions-filter" id="champ-filter" style="margin-bottom:1.5rem;">
        <button class="filter-btn active" style="background:#333;color:white;" onclick="setChampYearFilter('all')">All Years</button>
        ${CHAMP_YEARS.map(y=>`<button class="filter-btn" style="color:var(--text)" onclick="setChampYearFilter(${y})">${y}</button>`).join('')}
      </div>
      <div id="champ-sections">
        <div style="color:var(--muted);font-family:var(--font-cond);padding:3rem 0;text-align:center;">Loading...</div>
      </div>
    </section>
  `;
  await loadChampions();
}

async function loadChampions() {
  const { data } = await sb.from('champions').select('*').order('year', { ascending: false });
  champions = data || [];
  renderChampSections();
}

function setChampYearFilter(y) {
  champYearFilter = y;
  document.querySelectorAll('#champ-filter .filter-btn').forEach((btn, i) => {
    const isActive = i === 0 ? y === 'all' : CHAMP_YEARS[i-1] === y;
    btn.className = 'filter-btn' + (isActive ? ' active' : '');
    btn.style.cssText = isActive ? 'background:#333;color:white;' : 'color:var(--text)';
  });
  renderChampSections();
}

function renderChampSections() {
  const wrap = document.getElementById('champ-sections');
  if (!wrap) return;
  const years = champYearFilter === 'all' ? CHAMP_YEARS : [champYearFilter];
  let html = '';
  for (const year of years) {
    const yearData = champions.filter(c => c.year === year);
    // Only show league cards that have at least one entry for this year
    const activeLeagues = LEAGUES.filter(league => yearData.some(c => c.league_id === league.id));
    // Skip entire year section if no data and viewing all years
    if (activeLeagues.length === 0) continue;
    html += `<div style="margin-bottom:3rem;">
      <div style="font-family:var(--font-display);font-size:1.8rem;letter-spacing:3px;margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border);">${year} SEASON</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;">
        ${activeLeagues.map(league => {
          const leagueEntries = yearData.filter(c => c.league_id === league.id);
          return `<div style="background:var(--surface);border:1px solid var(--border);border-top:3px solid ${league.color};border-radius:12px;padding:1.25rem;">
            <div style="display:flex;align-items:center;gap:0.6rem;margin-bottom:1rem;">
              ${league.logo ? `<img src="${league.logo}" style="width:28px;height:28px;object-fit:contain;"/>` : `<div style="width:28px;height:28px;border-radius:50%;border:2px solid ${league.color};display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:0.6rem;color:${league.color};">${league.short}</div>`}
              <span style="font-family:var(--font-display);font-size:1.1rem;letter-spacing:2px;color:${league.color};">${league.short}</span>
            </div>
            ${AWARD_TYPES.map(award => {
              const entry = leagueEntries.find(c => c.award_type === award.id);
              if (!entry) return '';
              const isSB = award.id === 'superbowl';
              const iconHtml = award.img
                ? `<img src="${award.img}" style="width:${isSB?'44px':'22px'};height:${isSB?'44px':'22px'};object-fit:contain;min-width:${isSB?'44px':'22px'};${isSB?'mix-blend-mode:screen;filter:brightness(1.1);':''}"/>`
                : `<span style="font-size:${isSB?'1.6rem':'1rem'};min-width:${isSB?'36px':'20px'};text-align:center;">${award.icon}</span>`;
              return `<div style="display:flex;align-items:flex-start;gap:0.75rem;padding:${isSB?'1rem':'0.6rem'} 0;border-bottom:1px solid var(--border);${isSB?'background:rgba(255,255,255,0.03);border-radius:8px;padding:1rem;margin-bottom:0.5rem;':''}">
                ${iconHtml}
                <div style="flex:1;">
                  <div style="font-family:var(--font-cond);font-size:${isSB?'0.8rem':'0.7rem'};letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:${isSB?'4px':'2px'};">${award.label}</div>
                  <div style="font-weight:600;font-size:${isSB?'1.2rem':'0.95rem'};">${entry.champion_name}</div>
                  ${entry.team_name ? `<div style="color:var(--muted);font-size:${isSB?'0.9rem':'0.8rem'};font-family:var(--font-cond);">${entry.team_name}</div>` : ''}
                  ${entry.record ? `<div style="color:var(--muted);font-size:0.75rem;font-family:var(--font-cond);">${entry.record}</div>` : ''}
                </div>
                ${isChampionAdmin() ? `<button onclick="deleteChampion('${entry.id}', event)" style="background:none;border:none;color:rgba(255,255,255,0.2);cursor:pointer;font-size:1rem;padding:0.2rem 0.4rem;border-radius:4px;line-height:1;transition:color 0.2s;" onmouseover="this.style.color='#e53e3e'" onmouseout="this.style.color='rgba(255,255,255,0.2)'" title="Delete entry">✕</button>` : ''}
              </div>`;
            }).join('')}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }
  wrap.innerHTML = html || `<div style="color:var(--muted);font-family:var(--font-cond);padding:3rem 0;text-align:center;text-transform:uppercase;">No champions recorded yet. ${isChampionAdmin() ? 'Use the + Add Entry button to get started.' : ''}</div>`;
}

async function deleteChampion(id, e) {
  e.stopPropagation();
  if (!isChampionAdmin()) return;
  if (!confirm('Delete this champion entry? This cannot be undone.')) return;
  const { error } = await sb.from('champions').delete().eq('id', id);
  if (error) { showToast('Delete failed: ' + error.message, 'error'); return; }
  showToast('Entry deleted.', 'success');
  await loadChampions();
}

function openAddChampion() {
  const m = document.createElement('div');
  m.className = 'modal-overlay';
  m.innerHTML = `
    <div class="modal">
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
      <h3>Add Champion Entry</h3>
      <div class="modal-sub">Record a title for the hall of fame</div>
      <div class="form-group">
        <label>Season Year</label>
        <input type="number" id="m-year" value="${new Date().getFullYear()}" min="2010" max="2050"/>
      </div>
      <div class="form-group">
        <label>League</label>
        <select id="m-league">
          ${LEAGUES.map(l=>`<option value="${l.id}">${l.name}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>Award Type</label>
        <select id="m-award">
          ${AWARD_TYPES.map(a=>`<option value="${a.id}">${a.icon ? a.icon + ' ' : ''}${a.label}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>Champion's Name</label>
        <input type="text" id="m-name" placeholder="e.g. John Smith"/>
      </div>
      <div class="form-group">
        <label>Team Name</label>
        <input type="text" id="m-team" placeholder="e.g. Dallas Destroyers"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Season Record</label>
          <input type="text" id="m-record" placeholder="e.g. 12-2"/>
        </div>
        <div class="form-group">
          <label>Championship Score</label>
          <input type="text" id="m-score" placeholder="e.g. 142.36 - 118.54"/>
        </div>
      </div>
      <button class="submit-btn" onclick="saveChampion(this)">Add to Hall of Fame</button>
    </div>
  `;
  document.body.appendChild(m);
}

async function saveChampion(btn) {
  btn.disabled = true; btn.textContent = 'Saving...';
  const payload = {
    year: parseInt(document.getElementById('m-year').value),
    league_id: document.getElementById('m-league').value,
    award_type: document.getElementById('m-award').value,
    champion_name: document.getElementById('m-name').value.trim(),
    team_name: document.getElementById('m-team').value.trim(),
    record: document.getElementById('m-record').value.trim(),
    championship_score: document.getElementById('m-score').value.trim(),
    added_by: user?.id
  };
  if (!payload.champion_name) { showToast('Please enter a champion name.', 'error'); btn.disabled=false; btn.textContent='Add to Hall of Fame'; return; }
  const { error } = await sb.from('champions').insert(payload);
  if (error) { showToast('Error saving: ' + error.message, 'error'); btn.disabled=false; btn.textContent='Add to Hall of Fame'; return; }
  document.querySelector('.modal-overlay')?.remove();
  showToast('Champion added to the hall of fame!', 'success');
  await loadChampions();
}

              ${p.caption ? `<div style="color:var(--text);margin-top:2px;">${p.caption}</div>` : ''}
            </div>
            ${isChampionAdmin() ? `<button onclick="deletePhoto('${p.id}','${p.storage_path}',event)" style="position:absolute;top:0.5rem;right:0.5rem;background:rgba(0,0,0,0.7);border:none;color:rgba(255,255,255,0.4);cursor:pointer;font-size:0.85rem;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all 0.2s;z-index:10;" onmouseover="this.style.background='rgba(229,62,62,0.9)';this.style.color='white'" onmouseout="this.style.background='rgba(0,0,0,0.7)';this.style.color='rgba(255,255,255,0.4)'" title="Delete photo">✕</button>` : ''}
          </div>`;
      }).join('');
      html += `</div>`;
    }
    html += `</div>`;
  }

  wrap.innerHTML = html;
}

function openLightbox(url) {
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.innerHTML = `<button class="lightbox-close" onclick="this.parentElement.remove()">✕</button><img src="${url}"/>`;
  lb.onclick = (e) => { if(e.target === lb) lb.remove(); };
  document.body.appendChild(lb);
}

async function deletePhoto(id, storagePath, e) {
  e.stopPropagation();
  if (!isChampionAdmin()) return;
  if (!confirm('Delete this photo? This cannot be undone.')) return;
  await sb.storage.from('draft-photos').remove([storagePath]);
  const { error } = await sb.from('draft_photos').delete().eq('id', id);
  if (error) { showToast('Delete failed: ' + error.message, 'error'); return; }
  showToast('Photo deleted.', 'success');
  await loadPhotos();
}

function openUpload() {
  const m = document.createElement('div');
  m.className = 'modal-overlay';
  m.innerHTML = `
    <div class="modal">
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
      <h3>Upload Draft Photo</h3>
      <div class="modal-sub">Share memories from draft day</div>
      <input type="file" id="file-input" accept="image/*" onchange="previewFile(this)"/>
      <div class="upload-area" onclick="document.getElementById('file-input').click()" id="upload-area">
        <div style="font-size:2rem;">📁</div>
        <p>Click to select a photo or drag & drop</p>
        <p style="font-size:0.75rem;margin-top:0.25rem;">JPG, PNG, WEBP — max 10MB</p>
      </div>
      <img id="photo-preview" style="display:none;width:100%;border-radius:8px;margin-bottom:1rem;max-height:200px;object-fit:cover;"/>
      <div class="form-row">
        <div class="form-group">
          <label>Year</label>
          <input type="number" id="up-year" value="${new Date().getFullYear()}" min="2021" max="2030"/>
        </div>
        <div class="form-group">
          <label>Caption (optional)</label>
          <input type="text" id="up-caption" placeholder="Draft day 2024..."/>
        </div>
      </div>
      <button class="submit-btn" onclick="uploadPhoto(this)">Upload Photo</button>
    </div>
  `;
  document.body.appendChild(m);

  // drag & drop
  const area = m.querySelector('#upload-area');
  area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('drag'); });
  area.addEventListener('dragleave', () => area.classList.remove('drag'));
  area.addEventListener('drop', e => {
    e.preventDefault(); area.classList.remove('drag');
    const file = e.dataTransfer.files[0];
    if (file) { document.getElementById('file-input').files = e.dataTransfer.files; previewFile(document.getElementById('file-input')); }
  });
}

function previewFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const prev = document.getElementById('photo-preview');
    prev.src = e.target.result; prev.style.display = 'block';
    document.getElementById('upload-area').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function uploadPhoto(btn) {
  const fileInput = document.getElementById('file-input');
  if (!fileInput.files[0]) { showToast('Please select a photo first.', 'error'); return; }
  btn.disabled = true; btn.textContent = 'Uploading...';
  const file = fileInput.files[0];
  const ext = file.name.split('.').pop();
  const path = `${user.id}/${Date.now()}.${ext}`;
  const { error: uploadErr } = await sb.storage.from('draft-photos').upload(path, file);
  if (uploadErr) { showToast('Upload failed: ' + uploadErr.message, 'error'); btn.disabled=false; btn.textContent='Upload Photo'; return; }
  const { error: dbErr } = await sb.from('draft_photos').insert({
    storage_path: path,
    year: parseInt(document.getElementById('up-year').value),
    caption: document.getElementById('up-caption').value.trim() || null,
    uploaded_by: user.id
  });
  if (dbErr) { showToast('Database error: ' + dbErr.message, 'error'); btn.disabled=false; btn.textContent='Upload Photo'; return; }
  document.querySelector('.modal-overlay')?.remove();
  showToast('Photo uploaded successfully!', 'success');
  await loadPhotos();
}

function previewDocFile(input) {
  const file = input.files[0];
  if (!file) return;
  const nameEl = document.getElementById('doc-file-name');
  nameEl.textContent = '📄 ' + file.name;
  nameEl.style.display = 'block';
  document.getElementById('doc-upload-area').style.display = 'none';
}

async function uploadDoc(leagueId, btn) {
  const fileInput = document.getElementById('doc-file-input');
  if (!fileInput.files[0]) { showToast('Please select a PDF first.', 'error'); return; }
  const title = document.getElementById('doc-title').value.trim();
  if (!title) { showToast('Please enter a document title.', 'error'); return; }
  btn.disabled = true; btn.textContent = 'Uploading...';
  const file = fileInput.files[0];
  const path = `${leagueId}/${Date.now()}_${file.name.replace(/\s+/g, '_')}`;
  const { error: uploadErr } = await sb.storage.from('league-docs').upload(path, file);
  if (uploadErr) { showToast('Upload failed: ' + uploadErr.message, 'error'); btn.disabled=false; btn.textContent='Upload Document'; return; }
  const { error: dbErr } = await sb.from('league_docs').insert({
    league_id: leagueId,
    title: title,
    doc_type: document.getElementById('doc-type').value,
    storage_path: path,
    uploaded_by: user.id

  document.querySelector('.modal-overlay')?.remove();

  el.innerHTML = `

async function submitApplication(e) {
  e.preventDefault();
  const form = e.target;
  const btn = document.getElementById('join-submit');
  btn.disabled = true; btn.textContent = 'Submitting...';

  const leagues = [...form.querySelectorAll('input[name=leagues]:checked')].map(i=>i.value);

  const payload = {
    first_name: form.first_name.value.trim(),
    last_name: form.last_name.value.trim(),
    email: form.email.value.trim(),
    discord: form.discord.value.trim() || null,
    experience: form.experience.value || null,
    leagues_interested: leagues,
    message: form.message.value.trim() || null,
    referred_by: form.referred_by.value.trim() || null,
  };

  const { error } = await sb.from('prospect_applications').insert(payload);
  if (error) { showToast('Submission failed: ' + error.message, 'error'); btn.disabled=false; btn.textContent='Submit Application'; return; }

  const wrap = document.getElementById('join-form-wrap');
  wrap.innerHTML = `
    <div class="form-success">
      <div class="check">🏆</div>
      <h3>Application Received!</h3>
      <p>Thanks ${payload.first_name}, we'll review your application and reach out via email or Discord.</p>
    </div>
  `;
}

function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 4000);
}
